workflows:
  android-release-apk:
    name: Android Release APK
    max_build_duration: 120
    environment:
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps --no-optional --no-audit
      - name: Verify dependencies
        script: |
          if [ ! -d "node_modules/react-native" ]; then
            echo "ERROR: react-native not installed"
            exit 1
          fi
          if [ ! -f "node_modules/expo-modules-core/src/index.ts" ]; then
            echo "WARNING: expo-modules-core incomplete, continuing anyway"
          fi
      - name: Set up Expo
        script: |
          npm install -g eas-cli
          npm install -g expo-cli
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
